# Antigravity Trading Terminal — portable full stack
#
# Quick start (any machine with Docker):
#   cp .env.example .env    # optional — edit ports if 8080/5432/etc. are taken
#   docker compose up --build
#   open http://localhost:8080
#
# Distributed server/worker split (Redis):
#   Set in .env:  COMPOSE_PROFILES=distributed  TERMINAL_ROLE=server  REDIS_URL=redis://redis:6379/0
#   docker compose up --build

name: trading-terminal

x-backend-env: &backend-env
  TERMINAL_MODE: SIMULATED
  TERMINAL_ROLE: ${TERMINAL_ROLE:-all}
  HTTP_ENABLED: "true"
  HTTP_HOST: 0.0.0.0
  WS_HOST: 0.0.0.0
  HTTP_CORS_ORIGINS: ${HTTP_CORS_ORIGINS:-*}
  DATABASE_URL: postgresql://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading}@postgres:5432/${POSTGRES_DB:-trading}
  DB_REQUIRE_POOL: "1"
  DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
  DB_POOL_MIN: ${DB_POOL_MIN:-2}
  DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
  DB_STARTUP_RETRIES: ${DB_STARTUP_RETRIES:-10}
  DB_STARTUP_RETRY_BASE_SEC: ${DB_STARTUP_RETRY_BASE_SEC:-0.5}
  ALEMBIC_AUTO_UPGRADE: ${ALEMBIC_AUTO_UPGRADE:-1}
  REDIS_URL: ${REDIS_URL:-}
  ARCHIVE_ENABLED: "true"
  ARCHIVE_BACKEND: db
  ARCHIVE_BACKFILL_ON_STARTUP: "true"
  ARCHIVE_PARQUET_ENABLED: "false"
  ARCHIVE_TICKS_ENABLED: "true"
  ALLOW_LIVE_BOTS: "false"
  AGENT_ENABLED: "true"
  SENTIMENT_ENABLED: ${SENTIMENT_ENABLED:-true}
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  FINNHUB_API_URL: ${FINNHUB_API_URL:-https://finnhub.io/api/v1}
  STRATEGY_ADVISOR_ENABLED: ${STRATEGY_ADVISOR_ENABLED:-true}
  STRATEGY_ADVISOR_DEFAULT_DAYS: ${STRATEGY_ADVISOR_DEFAULT_DAYS:-30}
  # HTTP_API_KEY: ${HTTP_API_KEY:-}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    networks:
      - trading

  # Only required for COMPOSE_PROFILES=distributed (TERMINAL_ROLE=server + worker).
  redis:
    profiles: ["distributed"]
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    logging: *default-logging
    networks:
      - trading

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "main.py"]
    ports:
      - "${BACKEND_WS_PORT:-8765}:8765"
      - "${BACKEND_HTTP_PORT:-8766}:8766"
    environment:
      <<: *backend-env
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8766/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 60s
    stop_grace_period: 20s
    logging: *default-logging
    networks:
      - trading

  worker:
    profiles: ["distributed"]
    build:
      context: ./backend
    restart: unless-stopped
    command: ["python", "worker.py"]
    environment:
      <<: *backend-env
      TERMINAL_ROLE: worker
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - backend_data:/app/data
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,time,redis; r=redis.from_url(os.environ['REDIS_URL']); v=r.get('terminal:worker:heartbeat'); assert v and time.time()-float(v)<35",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    stop_grace_period: 20s
    logging: *default-logging
    networks:
      - trading

  frontend:
    build:
      context: ./frontend
      args:
        # Empty = same-origin relative URLs; nginx proxies /api, /health, /ws → backend
        VITE_HTTP_BASE_URL: ""
        VITE_WS_URL: ""
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://127.0.0.1/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks:
      - trading

networks:
  trading:
    name: trading-terminal-net

volumes:
  pgdata:
    name: trading-terminal-pgdata
  backend_data:
    name: trading-terminal-backend-data
