name: CI

on:
  push:
    branches: [main, 'algo-trading-*']
  pull_request:
    branches: [main, 'algo-trading-*']

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        run: |
          python main.py &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8766/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8766/health

      - name: Run E2E smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8766
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 1
          done
          npm run test:e2e

  etoro-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: eToro smoke (skipped without secrets)
        env:
          ETORO_API_KEY: ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
          ETORO_ACCESS_TOKEN: ${{ secrets.ETORO_ACCESS_TOKEN }}
        run: python scripts/etoro_smoke_test.py
