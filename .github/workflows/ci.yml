name: CI

on:
  push:
    branches: [main, 'algo-trading-*']
  pull_request:
    branches: [main, 'algo-trading-*']

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start backend
        working-directory: backend
        run: |
          python main.py &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8766/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8766/health

      - name: Run E2E smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_API_URL: http://127.0.0.1:8766
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:4173 && break
            sleep 1
          done
          npm run test:e2e

  worker-smoke:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Worker bar-close handler smoke
        env:
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/test_worker_bar_close.py tests/test_distributed_integration.py -q

      - name: Worker heartbeat smoke
        env:
          TERMINAL_MODE: SIMULATED
          TERMINAL_ROLE: worker
          REDIS_URL: redis://localhost:6379/0
        run: |
          python worker.py &
          WPID=$!
          for i in $(seq 1 30); do
            python -c "import os,time,redis; r=redis.from_url(os.environ['REDIS_URL']); v=r.get('terminal:worker:heartbeat'); exit(0 if v and time.time()-float(v)<35 else 1)" && break
            sleep 2
          done
          kill $WPID 2>/dev/null || true
          python -c "import os,time,redis; r=redis.from_url(os.environ['REDIS_URL']); v=r.get('terminal:worker:heartbeat'); assert v and time.time()-float(v)<35, 'worker heartbeat missing'"

  etoro-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: eToro smoke (skipped without secrets)
        env:
          ETORO_API_KEY: ${{ secrets.ETORO_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
          ETORO_ACCESS_TOKEN: ${{ secrets.ETORO_ACCESS_TOKEN }}
        run: python scripts/etoro_smoke_test.py

  ib-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: IB Gateway smoke (skipped when Gateway unreachable)
        env:
          IB_HOST: 127.0.0.1
          IB_PORT: 4002
        run: python scripts/ib_smoke_test.py

  massive-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Massive smoke (skipped without API key)
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: python scripts/massive_smoke_test.py

  ib-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: IB Gateway E2E (skipped when Gateway unreachable)
        env:
          IB_HOST: 127.0.0.1
          IB_PORT: 4002
        run: |
          python - <<'PY'
          import socket, subprocess, sys, time, os
          host, port = os.environ["IB_HOST"], int(os.environ["IB_PORT"])
          try:
              with socket.create_connection((host, port), timeout=2):
                  pass
          except OSError:
              print(f"SKIP: IB Gateway not reachable at {host}:{port}")
              sys.exit(0)
          subprocess.check_call([sys.executable, "scripts/ib_smoke_test.py"], cwd="../backend")
          proc = subprocess.Popen(
              [sys.executable, "main.py"],
              cwd="../backend",
              env={**os.environ, "TERMINAL_PROFILE": "ib", "TERMINAL_MODE": "LIVE_IB", "HTTP_PORT": "8776", "WS_PORT": "8775"},
          )
          try:
              for _ in range(45):
                  try:
                      import urllib.request
                      urllib.request.urlopen("http://127.0.0.1:8776/health", timeout=2)
                      break
                  except Exception:
                      time.sleep(2)
              else:
                  raise RuntimeError("IB backend health check timed out")
              subprocess.check_call(
                  ["npx", "playwright", "test", "e2e/ib-gateway.spec.js"],
                  env={**os.environ, "E2E_IB_API_URL": "http://127.0.0.1:8776"},
              )
          finally:
              proc.terminate()
              proc.wait(timeout=10)
          PY

  massive-e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend + Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Massive E2E (skipped without API key)
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python - <<'PY'
          import os, subprocess, sys, time, urllib.request
          if not os.environ.get("MASSIVE_API_KEY"):
              print("SKIP: MASSIVE_API_KEY not set")
              sys.exit(0)
          subprocess.check_call([sys.executable, "scripts/massive_smoke_test.py"], cwd="../backend")
          proc = subprocess.Popen(
              [sys.executable, "main.py"],
              cwd="../backend",
              env={
                  **os.environ,
                  "TERMINAL_PROFILE": "massive",
                  "TERMINAL_MODE": "LIVE_MASSIVE",
                  "HTTP_PORT": "8786",
                  "WS_PORT": "8785",
              },
          )
          try:
              for _ in range(45):
                  try:
                      urllib.request.urlopen("http://127.0.0.1:8786/health", timeout=2)
                      break
                  except Exception:
                      time.sleep(2)
              else:
                  raise RuntimeError("Massive backend health check timed out")
              subprocess.check_call(
                  ["npx", "playwright", "test", "e2e/massive-gateway.spec.js"],
                  env={**os.environ, "E2E_MASSIVE_API_URL": "http://127.0.0.1:8786"},
              )
          finally:
              proc.terminate()
              proc.wait(timeout=10)
          PY
